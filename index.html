<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Titan</title>
    <meta name="description" content="Aurora Titan — blazing-fast AI assistant.">

    <!-- Fonts: Inter (UI) + IBM Plex Mono (code) + Orbitron (Headers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <!-- App styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries loaded in <head> so they are ready before script.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<div class="app-shell">

    <!-- ════════════════════ SIDEBAR ════════════════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button class="icon-btn sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Chat
            </button>
        </div>

        <div class="sidebar-history" id="chatHistoryList"></div>

        <div class="sidebar-bottom">
            <button class="sidebar-nav-btn" id="settingsBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
            </button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ════════════════════ MAIN AREA ════════════════════ -->
    <main class="main-area">

        <!-- Mobile topbar -->
        <header class="topbar">
            <button class="icon-btn" id="sidebarOpenBtn" aria-label="Open sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <span class="topbar-title">Aurora Titan</span>
            <div style="width:36px"></div>
        </header>

        <!-- Chat scroll area -->
        <div class="chat-container" id="chatContainer">
            <div id="chatMessages">

                <!-- ─── Welcome / Empty State ─── -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-glow"></div>
                    <div class="welcome-icon">✦</div>
                    <h1 class="welcome-title">Aurora Titan</h1>
                    <p class="welcome-sub">Fast. Intelligent. At your command.</p>

                    <div class="suggestions-grid">
                        <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
                            <span class="suggestion-icon">⚛️</span>
                            <span>Explain quantum computing in simple terms</span>
                        </button>
                        <button class="suggestion-card" data-prompt="Write a Python script to scrape a webpage">
                            <span class="suggestion-icon">🐍</span>
                            <span>Write a Python script to scrape a webpage</span>
                        </button>
                        <button class="suggestion-card" data-prompt="Give me a 7-day meal plan for muscle gain">
                            <span class="suggestion-icon">💪</span>
                            <span>Give me a 7-day meal plan for muscle gain</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Floating pill input -->
        <div class="input-zone">
            <div class="input-pill" id="inputPill">
                <textarea
                    id="userInput"
                    placeholder="Ask anything…"
                    rows="1"
                    aria-label="Message input"
                ></textarea>
                <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
        </div>
    </main>
</div>

<!-- ════════════════════ SETTINGS MODAL ════════════════════ -->
<div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-card">
        <div class="modal-header">
            <h2 id="settingsTitle">Settings</h2>
            <button class="icon-btn" id="closeSettingsBtn" aria-label="Close settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label for="modelSelect" class="form-label">AI Model</label>
                <select id="modelSelect" class="form-select">
                    <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash ⚡ (Fastest)</option>
                    <option value="google/gemini-pro">Gemini Pro</option>
                    <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
                    <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                    <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Free)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="systemPromptInput" class="form-label">System Instructions</label>
                <textarea id="systemPromptInput" class="form-textarea" rows="5"
                    placeholder="You are a helpful assistant…"></textarea>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-ghost" id="clearMemoryBtn">Clear Memory</button>
            <div style="display:flex;gap:8px">
                <button class="btn-ghost" id="cancelSettingsBtn">Cancel</button>
                <button class="btn-primary" id="saveSettingsBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
